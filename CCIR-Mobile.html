<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>V Corps CCIR — Mobile</title>
<style>
  :root {
    --army-dark:  #2d3a1e;
    --army-green: #4a5c3a;
    --army-tan:   #c8b87a;
    --army-light: #f0ece0;
    --bg:         #eae6da;
    --card-bg:    #ffffff;
    --border:     #d4cdb8;
    --c-red:      #a93226;
    --c-amber:    #d68910;
    --c-green:    #1e8449;
    --c-blue:     #2471a3;
    --c-gray:     #717d7e;
    --c-wu:       #922b21;
    --c-fl:       #d4ac0d;
    --text:       #1a1a1a;
    --subtext:    #555;
    --header-h:   112px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior: none;
  }

  /* ── STICKY HEADER ── */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--army-dark);
    border-bottom: 3px solid var(--army-tan);
    padding: env(safe-area-inset-top, 0) 0 0;
  }

  .unclass-strip {
    background: #27ae60;
    color: #fff;
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2.5px;
    padding: 3px 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px 6px;
  }

  .header-row svg { flex-shrink: 0; }

  .header-text h1 {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: .8px;
    line-height: 1.2;
  }
  .header-text p {
    font-size: 10px;
    color: #b8c8a0;
    margin-top: 2px;
  }

  .search-row {
    display: flex;
    gap: 7px;
    padding: 0 12px 9px;
  }

  .search-row input {
    flex: 1;
    padding: 9px 12px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    background: #f0ece0;
    color: var(--text);
    outline: none;
  }
  .search-row input::placeholder { color: #888; }

  .search-row select {
    padding: 9px 8px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    background: #f0ece0;
    color: var(--text);
    outline: none;
    max-width: 110px;
  }

  .result-strip {
    background: var(--army-green);
    color: #d4e8b0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .4px;
    padding: 4px 14px;
    text-align: center;
  }

  /* ── FILTER CHIPS ── */
  .chip-row {
    background: #1e2b12;
    padding: 6px 12px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .chip-row::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    background: #4a6030;
    color: #e8ecd8;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .chip:active { background: #6a8050; }
  .chip.urg-c   { background: #922b21; color: #fff; }
  .chip.urg-i   { background: #d4ac0d; color: #1a1a1a; }
  .chip.urg-r   { background: #1a6b3c; color: #fff; }
  .chip.active  { outline: 2px solid var(--army-tan); outline-offset: 1px; }

  /* ── LIST ── */
  .list-wrap {
    padding: 10px 10px 30px;
    padding-top: calc(var(--header-h) + 10px);
  }

  /* Category section header */
  .cat-section-hdr {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 16px 0 6px;
    padding: 0 2px;
  }
  .cat-section-hdr:first-child { margin-top: 2px; }
  .cat-section-name {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--army-green);
  }
  .cat-section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .cat-section-count {
    font-size: 11px;
    color: #999;
  }

  /* ── CARD ── */
  .card {
    background: var(--card-bg);
    border-radius: 10px;
    margin-bottom: 7px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.10);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: box-shadow .15s;
  }
  .card:active { box-shadow: 0 0 0 2px var(--army-tan); }

  .card-main {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
  }

  /* Left urgency stripe */
  .card[data-urg="C"] { border-left: 4px solid var(--c-red); }
  .card[data-urg="I"] { border-left: 4px solid var(--c-amber); }
  .card[data-urg="R"] { border-left: 4px solid var(--c-green); }

  .card-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--subtext);
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .card-title {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
  }

  .card-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .urg-badge {
    font-size: 11px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 5px;
    letter-spacing: .5px;
  }
  .urg-C { background: var(--c-red);   color: #fff; }
  .urg-I { background: var(--c-amber); color: #1a1a1a; }
  .urg-R { background: var(--c-green); color: #fff; }

  .chevron {
    font-size: 13px;
    color: #bbb;
    transition: transform .2s;
    line-height: 1;
  }
  .card.open .chevron { transform: rotate(180deg); }

  /* ── EXPANDED DETAIL PANEL ── */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 13px 14px 14px;
    background: #fafaf7;
    animation: slideDown .18s ease-out;
  }
  .card.open .card-detail { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Description */
  .detail-desc {
    font-size: 13.5px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 12px;
  }
  .detail-desc:empty { display: none; }

  /* Meta row: Classification */
  .detail-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    align-items: center;
  }
  .meta-label {
    font-size: 11px;
    color: var(--subtext);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .cls-badge {
    font-size: 11px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 5px;
    letter-spacing: .5px;
  }
  .cls-S { background: #ffeeba; color: #7d6008; }
  .cls-U { background: #d4efdf; color: #1a6b3c; }

  /* Notification level grid */
  .notif-section-label {
    font-size: 11px;
    font-weight: 800;
    color: var(--subtext);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 7px;
  }

  .notif-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    margin-bottom: 12px;
  }

  .notif-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .notif-cell-label {
    font-size: 10px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .notif-pill {
    font-size: 11px;
    font-weight: 800;
    padding: 3px 0;
    width: 100%;
    text-align: center;
    border-radius: 5px;
    letter-spacing: .3px;
  }
  .np-WU { background: var(--c-wu);   color: #fff; }
  .np-FL { background: var(--c-fl);   color: #1a1a1a; }
  .np-R  { background: var(--c-blue); color: #fff; }
  .np-D  { background: var(--c-gray); color: #fff; }
  .np-xx { background: #444;          color: #fff; }

  /* Notes */
  .notes-section { margin-top: 4px; }
  .note-item {
    background: #fff8e8;
    border-left: 3px solid var(--army-tan);
    border-radius: 0 6px 6px 0;
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 12.5px;
    line-height: 1.55;
    color: #333;
  }
  .note-item:last-child { margin-bottom: 0; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--subtext);
  }
  .empty-state .emoji { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    font-size: 10px;
    color: #999;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0));
    background: var(--bg);
    letter-spacing: .5px;
  }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }
</style>
</head>

const CAT_LABELS = {

};

const URG_LABELS = { C:'Critical', I:'Immediate', R:'Routine' };

// ═══════════════════════════════════════════════════
// HEADER HEIGHT MEASUREMENT
// ═══════════════════════════════════════════════════
function updateHeaderHeight() {
  const h = document.getElementById('topBar').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
  document.getElementById('listWrap').style.paddingTop = (h + 10) + 'px';
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function npClass(code) {
  return code === 'WU' ? 'np-WU' : code === 'FL' ? 'np-FL' :
         code === 'R'  ? 'np-R'  : code === 'D'  ? 'np-D'  : 'np-xx';
}

function buildDetail(row) {
  // Description
  const descHtml = row.desc
    ? `<div class="detail-desc">${row.desc.replace(/\n/g, '<br>')}</div>`
    : '';

  // Classification + urgency meta
  const urgLabel = URG_LABELS[row.urg] || row.urg;
  const urgClass = 'urg-' + row.urg;
  const clsClass = 'cls-' + row.cls;
  const clsLabel = row.cls === 'S' ? 'Sensitive' : 'Unclassified';
  const metaHtml = `
    <div class="detail-meta">
      <span class="meta-label">Urgency:</span>
      <span class="urg-badge ${urgClass}">${urgLabel}</span>
      <span class="meta-label" style="margin-left:8px">Classification:</span>
      <span class="cls-badge ${clsClass}">${row.cls} — ${clsLabel}</span>
    </div>`;

  // Notification grid
  const levels = [
    { label:'G33',  code: row.g33 },
    { label:'G3',   code: row.g3  },
    { label:'CoS',  code: row.cos },
    { label:'DCG',  code: row.dcg },
    { label:'CG',   code: row.cg  }
  ];
  const cellsHtml = levels.map(l => `
    <div class="notif-cell">
      <div class="notif-cell-label">${l.label}</div>
      <div class="notif-pill ${npClass(l.code)}">${l.code}</div>
    </div>`).join('');
  const notifHtml = `
    <div class="notif-section-label">Notification Levels</div>
    <div class="notif-grid">${cellsHtml}</div>`;

  // Notes
  let notesHtml = '';
  if (row.notes && row.notes.length) {
    notesHtml = `<div class="notes-section">` +
      row.notes.map(n => `<div class="note-item">${NOTES[n] || ''}</div>`).join('') +
    `</div>`;
  }

  return descHtml + metaHtml + notifHtml + notesHtml;
}

function toggleCard(card) {
  const isOpen = card.classList.contains('open');
  // Close all open cards
  document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) {
    card.classList.add('open');
    // Scroll card into view with a small delay for animation
    setTimeout(() => {
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

let activeChip = '';

function setChip(el, cat) {
  activeChip = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  const urg = document.getElementById('urgFilter').value;

  let shown = 0;
  document.querySelectorAll('.card').forEach(card => {
    const matchCat = !activeChip || card.dataset.cat === activeChip;
    const matchUrg = !urg || card.dataset.urg === urg;
    const matchQ   = !q   || card.dataset.text.includes(q);
    const show = matchCat && matchUrg && matchQ;
    card.classList.toggle('hidden', !show);

    // Also hide section headers if needed (handled separately)
    if (show) shown++;
  });

  // Hide/show category section headers
  document.querySelectorAll('.cat-section-hdr').forEach(hdr => {
    const cat = hdr.dataset.cat;
    const anyVisible = Array.from(
      document.querySelectorAll(`.card[data-cat="${cat}"]`)
    ).some(c => !c.classList.contains('hidden'));
    hdr.classList.toggle('hidden', !anyVisible);
  });

  const total = CCIRS.length;
  document.getElementById('resultStrip').textContent =
    shown === total ? `All ${total} CCIRs` : `${shown} of ${total} CCIRs`;
}

function renderList() {
  const wrap = document.getElementById('listWrap');
  wrap.innerHTML = '';

  // Group by category in order
  const ORDER = ['AVN','CYBER','GEN','IAMD','OPS','RUS','SPOT','R-27','UKR'];
  const grouped = {};
  ORDER.forEach(cat => { grouped[cat] = []; });
  CCIRS.forEach(row => {
    if (grouped[row.cat]) grouped[row.cat].push(row);
  });

  ORDER.forEach(cat => {
    const rows = grouped[cat];
    if (!rows.length) return;

    // Section header
    const hdr = document.createElement('div');
    hdr.className = 'cat-section-hdr';
    hdr.dataset.cat = cat;
    hdr.innerHTML = `
      <div class="cat-section-name">${CAT_LABELS[cat] || cat}</div>
      <div class="cat-section-line"></div>
      <div class="cat-section-count">${rows.length}</div>`;
    wrap.appendChild(hdr);

    rows.forEach(row => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.cat  = row.cat;
      card.dataset.urg  = row.urg;
      card.dataset.text = [row.cat, row.num, row.title, row.desc,
        row.g33, row.g3, row.cos, row.dcg, row.cg].join(' ').toLowerCase();

      card.innerHTML = `
        <div class="card-main" onclick="toggleCard(this.closest('.card'))">
          <div class="card-num">${row.num}</div>
          <div class="card-title">${row.title}</div>
          <div class="card-right">
            <span class="urg-badge urg-${row.urg}">${URG_LABELS[row.urg]}</span>
            <span class="chevron">&#8964;</span>
          </div>
        </div>
        <div class="card-detail">${buildDetail(row)}</div>`;

      wrap.appendChild(card);
    });
  });

  // Empty state
  const empty = document.createElement('div');
  empty.className = 'empty-state hidden';
  empty.id = 'emptyState';
  empty.innerHTML = `<div class="emoji">🔍</div><p>No CCIRs match your search.</p>`;
  wrap.appendChild(empty);

  // Set first chip active
  document.querySelector('.chip[data-cat=""]').classList.add('active');
  applyFilters();
}

// ═══════════════════════════════════════════════════
// INIT

renderList();
